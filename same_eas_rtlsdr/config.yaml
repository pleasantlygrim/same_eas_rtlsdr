name: SAME EAS RTL-SDR
version: "0.1.0"
slug: same_eas_rtlsdr
description: Decode NOAA SAME/EAS alerts from RTL-SDR and fire Home Assistant events
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: services
boot: auto
init: false

usb: true
privileged:
  - SYS_RAWIO
devices:
  - /dev/bus/usb

webui: "http://[HOST]:[PORT:8080]"

ports:
  8080/tcp: 8080

hassio_api: true
homeassistant_api: true

options:
  frequency: "162.550M"
  event_type: "same_eas_alert"
  audio_stream: false
  audio_port: 8080

schema:
  frequency: list(162.400M|162.425M|162.450M|162.475M|162.500M|162.525M|162.550M)
  event_type: str
  audio_stream: bool
  audio_port: port
